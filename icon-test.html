<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #333; color: white; display: flex; gap: 20px; font-family: 'DM Mono', monospace; font-size: 24px;}
        .icon { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border: 1px solid white;}
    </style>
</head>
<body>
    <div class="icon">■</div> <!-- stop -->
    <div class="icon">⏸</div> <!-- old pause -->
    <div class="icon">||</div> <!-- pipe -->
    <div class="icon" style="font-weight: 800;">||</div> <!-- bold pipe -->
    <div class="icon">II</div> <!-- capital i -->
    <div class="icon">❚❚</div> <!-- heavy vertical -->
    <div class="icon">▮▮</div> <!-- black vertical rect -->
</body>
</html>
