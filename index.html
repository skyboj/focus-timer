<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1a16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Focus">
  <title>Focus — Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #0d1a16;
      --bg2: #152820;
      --bg3: #1c3328;
      --mint: #4dffc3;
      --mint2: #2dcfa0;
      --mint-dim: #1a5c45;
      --gray: #8aada0;
      --gray2: #4a6b60;
      --text: #d4f0e8;
      /* ring shrinks automatically on short screens so content always fits */
      --ring-size: min(70vw, 310px, max(160px, calc(100svh - 460px)));
    }

    /* ── LIGHT (BRIGHT) THEME ── */
    [data-theme="light"] {
      --bg: #f0faf5;
      --bg2: #dff2e8;
      --bg3: #c8e8d8;
      --mint: #059669;
      --mint2: #047857;
      --mint-dim: #a7f3d0;
      --gray: #3d7264;
      --gray2: #71a895;
      --text: #0d2b22;
    }

    /* Background glow */
    [data-theme="light"] body::after {
      background: radial-gradient(ellipse at center top, rgba(5, 150, 105, 0.05) 0%, transparent 65%);
    }

    /* Secondary buttons */
    [data-theme="light"] .btn-sec {
      background: rgba(0, 0, 0, 0.05);
      border-color: rgba(5, 150, 105, 0.25);
    }

    [data-theme="light"] .btn-sec:active {
      background: rgba(5, 150, 105, 0.12);
      border-color: rgba(5, 150, 105, 0.5);
    }

    /* Play button glow */
    [data-theme="light"] .btn-play {
      box-shadow: 0 0 26px rgba(5, 150, 105, 0.25);
    }

    /* Wheel highlight in light mode */
    [data-theme="light"] .wheel-highlight {
      background: rgba(5, 150, 105, 0.06);
      border-color: rgba(5, 150, 105, 0.3);
    }

    /* Focus overlay gradient */
    [data-theme="light"] .focus-overlay {
      background: linear-gradient(to top, rgba(240, 250, 245, 0.95) 0%, transparent 100%);
    }

    /* Focus overlay buttons */
    [data-theme="light"] .focus-btn {
      background: rgba(240, 250, 245, 0.75);
      color: rgba(13, 43, 34, 0.5);
      border-color: rgba(5, 150, 105, 0.25);
    }

    [data-theme="light"] .focus-btn:hover {
      color: rgba(13, 43, 34, 0.75);
      border-color: rgba(5, 150, 105, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: fixed;
    }

    body::after {
      content: '';
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      height: 60vh;
      background: radial-gradient(ellipse at center top, rgba(77, 255, 195, 0.05) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      padding: 0 24px;
      padding-top: env(safe-area-inset-top, 14px);
      padding-bottom: env(safe-area-inset-bottom, 14px);
    }

    /* Header */
    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 10px;
      flex-shrink: 0;
      overflow: hidden;
      max-height: 72px;
      transition: opacity 0.45s ease, transform 0.45s ease,
        max-height 0.45s ease, padding 0.45s ease;
    }

    .app-title {
      font-family: 'DM Mono', monospace;
      font-size: 17px;
      font-weight: 300;
      color: var(--mint);
      letter-spacing: 0.08em;
    }

    .header-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--mint-dim);
      background: transparent;
      color: var(--gray);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .icon-btn:active {
      transform: scale(0.9);
    }

    .task-label {
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--gray);
      min-height: 18px;
      margin-bottom: 10px;
      flex-shrink: 0;
      text-align: center;
      overflow: hidden;
      max-height: 26px;
      transition: opacity 0.45s ease, transform 0.45s ease,
        max-height 0.45s ease, margin 0.45s ease;
    }

    .scroll-area {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 0px;
      transition: padding-bottom 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Ring */
    .ring-wrap {
      position: relative;
      width: var(--ring-size);
      height: var(--ring-size);
      flex-shrink: 0;
      margin-top: 12px;
    }

    .ring-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .ring-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      transition: transform 0.7s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    .app.focus-mode .ring-center {
      transform: translate(-50%, -50%) scale(1.07);
    }

    .time-display {
      font-family: 'DM Mono', monospace;
      font-size: clamp(42px, 12vw, 64px);
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
      transition: color 1s ease;
    }

    .time-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--gray2);
      text-transform: uppercase;
      margin-top: 5px;
      font-family: 'DM Mono', monospace;
    }

    .voice-pill {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--mint-dim);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 9px;
      color: var(--gray2);
      white-space: nowrap;
      transition: all 0.3s;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
    }

    .voice-pill.speaking {
      border-color: var(--mint);
      color: var(--mint);
    }

    @keyframes sblink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.2
      }
    }

    .voice-pill.speaking::before {
      content: '◉ ';
      animation: sblink 0.7s infinite;
    }

    .voice-pill:not(.speaking)::before {
      content: '◎ ';
    }

    /* Controls */
    .controls {
      margin-top: clamp(16px, 4.5svh, 32px);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .btn-sec {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid rgba(77, 255, 195, 0.2);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      font-weight: 500;
    }

    .btn-sec:active {
      transform: scale(0.9);
      background: rgba(77, 255, 195, 0.12);
      border-color: rgba(77, 255, 195, 0.4);
    }

    /* Breathing animation */
    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        filter: brightness(1);
      }

      50% {
        transform: scale(1.022);
        filter: brightness(1.06);
      }
    }

    .ring-wrap.breathing {
      animation: breathe 4s ease-in-out infinite;
      transform-origin: center center;
    }

    .btn-play {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      border: none;
      background: var(--mint);
      color: var(--bg);
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      box-shadow: 0 0 26px rgba(77, 255, 195, 0.3);
    }

    .btn-play:active {
      transform: scale(0.92);
    }

    .btn-play.paused {
      background: var(--mint2);
    }

    /* Voice log */
    .voice-log {
      margin-top: clamp(8px, 2svh, 14px);
      min-height: clamp(20px, 3svh, 28px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 100%;
      padding: 0 8px;
      transition: opacity 0.22s ease 0.04s, transform 0.22s ease 0.04s;
    }

    .voice-msg {
      font-size: 11px;
      color: var(--mint);
      font-style: italic;
      font-family: 'DM Mono', monospace;
      opacity: 0;
      transition: opacity 0.4s;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .voice-msg.show {
      opacity: 0.7;
    }

    /* ── iOS WHEEL PICKER ── */
    .wheel-section {
      margin-top: clamp(10px, 2.5svh, 20px);
      width: 100%;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.22s ease 0.08s, transform 0.22s ease 0.08s;
    }

    .wheel-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .wheel-container {
      position: relative;
      height: 220px;
      /* VISIBLE(5) × ITEM_H(44) */
      width: 70px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .wheel-container:active {
      cursor: grabbing;
    }

    .wheel-drum {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      will-change: transform;
    }

    .wheel-item {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 30px;
      font-weight: 300;
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
    }

    .wheel-highlight {
      position: absolute;
      top: 88px;
      /* CENTER_OFF = (VISIBLE-1)/2 × ITEM_H */
      left: -6px;
      right: -6px;
      height: 44px;
      background: rgba(77, 255, 195, 0.05);
      border-top: 1px solid var(--mint-dim);
      border-bottom: 1px solid var(--mint-dim);
      border-radius: 8px;
      pointer-events: none;
      z-index: 1;
    }

    .wheel-fade {
      position: absolute;
      left: 0;
      right: 0;
      height: 88px;
      /* 2 × ITEM_H */
      pointer-events: none;
      z-index: 2;
    }

    .wheel-fade-top {
      top: 0;
      background: linear-gradient(to bottom, var(--bg) 10%, transparent 100%);
    }

    .wheel-fade-bottom {
      bottom: 0;
      background: linear-gradient(to top, var(--bg) 10%, transparent 100%);
    }

    .wheel-unit {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: var(--gray2);
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    /* Done bounce */
    @keyframes done-bounce {

      0%,
      100% {
        transform: scale(1)
      }

      40% {
        transform: scale(1.04)
      }
    }

    .ring-wrap.done {
      animation: done-bounce 0.7s ease 2;
    }

    /* ── FOCUS MODE ── */
    /* Whole app slides to focus state */
    .app.focus-mode .header,
    .app.focus-mode .task-label {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-12px);
      max-height: 0;
      /* transition is on base selectors — handles both enter and exit */
    }

    .app.focus-mode .header {
      padding: 0;
    }

    .app.focus-mode .task-label {
      margin: 0;
    }

    .app.focus-mode .scroll-area {
      justify-content: center;
      overflow: hidden;
      padding-bottom: 120px;
    }

    /* Ring expands to fill screen */
    .ring-wrap {
      transition: width 0.72s cubic-bezier(0.34, 1.3, 0.64, 1),
        height 0.72s cubic-bezier(0.34, 1.3, 0.64, 1),
        margin 0.65s ease;
    }

    .app.focus-mode .ring-wrap {
      width: min(calc(100vw - 36px), calc(100svh - 180px));
      height: min(calc(100vw - 36px), calc(100svh - 180px));
      margin: 0;
      position: relative;
    }

    /* Ring Wrap fades out when setting up */
    .ring-wrap {
      transition: width 0.72s cubic-bezier(0.34, 1.3, 0.64, 1),
        height 0.72s cubic-bezier(0.34, 1.3, 0.64, 1),
        margin 0.65s ease, opacity 0.35s ease, transform 0.4s ease, visibility 0s 0.35s;
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 5vh;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      visibility: hidden;
    }

    /* Setup section shown when not running */
    .setup-section {
      width: 100%;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.35s ease, transform 0.4s ease, visibility 0s 0s;
      position: relative;
      z-index: 10;
      margin-top: 10vh;
      height: 300px;
    }

    /* Running State Toggles */
    .app.running .ring-wrap {
      opacity: 1;
      pointer-events: auto;
      position: relative;
      top: auto;
      left: auto;
      transform: none;
      visibility: visible;
      transition: width 0.72s cubic-bezier(0.34, 1.3, 0.64, 1),
        height 0.72s cubic-bezier(0.34, 1.3, 0.64, 1),
        margin 0.65s ease, opacity 0.35s ease, transform 0.4s ease, visibility 0s 0s;
    }

    .app.running .setup-section {
      opacity: 0;
      pointer-events: none;
      position: absolute;
      transform: scale(0.9) translateY(20px);
      z-index: -1;
      visibility: hidden;
      transition: opacity 0.35s ease, transform 0.4s ease, visibility 0s 0.4s;
    }

    /* Bottom section collapses smoothly */
    .bottom-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      overflow: hidden;
      max-height: 480px;
      transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app.focus-mode .bottom-section {
      max-height: 0;
      pointer-events: none;
    }

    /* Staggered exit: controls → voice-log → presets */
    .app.focus-mode .controls {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .app.focus-mode .voice-log {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.22s ease 0.04s, transform 0.22s ease 0.04s;
    }



    /* Focus overlay buttons */
    .focus-overlay {
      display: flex;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      /* when hiding: fade out first, then remove from hit-testing */
      transition: opacity 0.28s ease, visibility 0s linear 0.28s, transform 0.28s ease;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 32px);
      padding-top: 28px;
      z-index: 100;
      flex-direction: row;
      gap: 20px;
      justify-content: center;
      align-items: flex-end;
      background: linear-gradient(to top, rgba(13, 26, 22, 0.9) 0%, transparent 100%);
    }

    /* focus-overlay is a sibling of .app, not a child — use ~ combinator */
    .app.focus-mode~.focus-overlay {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
      /* slide up after ring expansion is well underway */
      transition: opacity 0.4s ease 0.58s, visibility 0s linear 0.58s,
        transform 0.5s cubic-bezier(0.34, 1.3, 0.64, 1) 0.58s;
    }

    .focus-btn {
      flex: 1;
      max-width: 160px;
      height: 72px;
      border-radius: 20px;
      border: 1px solid rgba(77, 255, 195, 0.2);
      background: rgba(13, 26, 22, 0.6);
      color: rgba(212, 240, 232, 0.35);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      position: relative;
      overflow: hidden;
    }

    .focus-btn:hover {
      color: rgba(212, 240, 232, 0.55);
      border-color: rgba(77, 255, 195, 0.35);
    }

    .focus-btn-icon {
      font-size: 22px;
      line-height: 1;
    }

    .focus-btn-lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Hold-to-stop border ring */
    .hold-svg {
      position: absolute;
      top: -1px;
      left: -1px;
      width: calc(100% + 2px);
      height: calc(100% + 2px);
      pointer-events: none;
      border-radius: inherit;
    }

    .hold-rect-fg {
      fill: none;
      stroke: var(--mint);
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.05s linear;
      filter: drop-shadow(0 0 6px rgba(77, 255, 195, 0.8));
    }

    /* Voice pill: ring is now in normal flow, so base bottom:-14px positioning works fine.
     No focus-mode override needed. */

    /* ── SHORT PORTRAIT (e.g. iPhone SE, short browser windows) ── */
    @media (max-height: 650px) and (orientation: portrait) {
      .btn-play {
        width: 62px;
        height: 62px;
        font-size: 22px;
      }

      .btn-sec {
        width: 44px;
        height: 44px;
        font-size: 16px;
      }

      .wheel-item {
        font-size: 26px;
        height: 40px;
      }

      .wheel-container {
        height: 200px;
        width: 60px;
      }

      .wheel-highlight {
        height: 40px;
        top: 80px;
      }

      .wheel-fade {
        height: 80px;
      }

      .focus-btn {
        height: clamp(54px, 8svh, 72px);
      }
    }

    /* ── LANDSCAPE ON PHONES — two-column layout ── */
    @media (orientation: landscape) and (max-height: 500px) {
      :root {
        --ring-size: min(45svh, 250px);
      }

      .scroll-area {
        flex-direction: row;
        align-items: center;
        gap: 12px;
        overflow-y: hidden;
        padding: 0 4px;
      }

      .ring-wrap {
        margin-top: 0;
        flex-shrink: 0;
      }

      .bottom-section {
        flex: 1;
        max-height: none;
        overflow: visible;
        align-items: flex-start;
      }

      .app.focus-mode .bottom-section {
        max-height: 0;
        pointer-events: none;
      }

      .controls {
        margin-top: 0;
        justify-content: flex-start;
      }

      .btn-play {
        width: 56px;
        height: 56px;
        font-size: 20px;
      }

      .btn-sec {
        width: 42px;
        height: 42px;
        font-size: 15px;
      }

      .wheel-item {
        font-size: 24px;
        height: 36px;
      }

      .wheel-container {
        height: 180px;
        width: 50px;
      }

      .wheel-highlight {
        height: 36px;
        top: 72px;
      }

      .wheel-fade {
        height: 72px;
      }

      .focus-btn {
        height: 56px;
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <div class="header">
      <span class="app-title">focus.</span>
      <div class="header-btns">
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
        <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
      </div>
    </div>

    <div class="task-label" id="taskLabel">5 min</div>

    <div class="scroll-area">
      <div class="ring-wrap" id="ringWrap">
        <canvas class="ring-canvas" id="ringCanvas"></canvas>
        <div class="ring-center">
          <div class="time-display" id="timeDisplay">05:00</div>
          <div class="time-label" id="timeLabel">ready</div>
        </div>
        <div class="voice-pill" id="voicePill">voice</div>
      </div>

      <!-- The setup view -->
      <div class="setup-section" id="setupSection">
        <div class="wheel-row">
          <div class="wheel-col">
            <div class="wheel-container" id="hourWheelEl">
              <div class="wheel-drum" id="hourDrum"></div>
              <div class="wheel-highlight"></div>
              <div class="wheel-fade wheel-fade-top"></div>
              <div class="wheel-fade wheel-fade-bottom"></div>
            </div>
            <span class="wheel-unit">hr</span>
          </div>

          <span style="font-size:32px; font-weight:300; margin-top:-18px; opacity: 0.3;">:</span>

          <div class="wheel-col">
            <div class="wheel-container" id="minuteWheelEl">
              <div class="wheel-drum" id="minuteDrum"></div>
              <div class="wheel-highlight"></div>
              <div class="wheel-fade wheel-fade-top"></div>
              <div class="wheel-fade wheel-fade-bottom"></div>
            </div>
            <span class="wheel-unit">min</span>
          </div>

          <span style="font-size:32px; font-weight:300; margin-top:-18px; opacity: 0.3;">:</span>

          <div class="wheel-col">
            <div class="wheel-container" id="secondWheelEl">
              <div class="wheel-drum" id="secondDrum"></div>
              <div class="wheel-highlight"></div>
              <div class="wheel-fade wheel-fade-top"></div>
              <div class="wheel-fade wheel-fade-bottom"></div>
            </div>
            <span class="wheel-unit">sec</span>
          </div>
        </div>
      </div>

      <div class="bottom-section">
        <div class="controls">
          <button class="btn-sec" onclick="resetTimer()">↺</button>
          <button class="btn-play" id="playBtn" onclick="toggleTimer()">▶</button>
          <button class="btn-sec" onclick="addMinute()">+1</button>
        </div>

        <div class="voice-log">
          <div class="voice-msg" id="voiceMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Focus mode overlay -->
  <div class="focus-overlay" id="focusOverlay">
    <button class="focus-btn" id="focusPauseBtn" onclick="pauseFromFocus()">
      <div class="focus-btn-icon">⏸</div>
      <div class="focus-btn-lbl">pause</div>
    </button>
    <button class="focus-btn" id="focusStopBtn">
      <div class="focus-btn-icon">■</div>
      <div class="focus-btn-lbl">hold to stop</div>
      <svg class="hold-svg">
        <rect class="hold-rect-fg" id="holdArc" />
      </svg>
    </button>
  </div>

  <script>
    // ── State ──────────────────────────────────────
    let totalSeconds = 5 * 60;
    let remainingSeconds = 5 * 60;
    let isRunning = false;
    let isMuted = false;
    let isLight = false;
    let interval = null;
    let currentPreset = '5 min';
    let lastSpeakTime = 0;
    let lastFiveMinAnn = 0;
    let hasHalf = false, has5 = false, has2 = false, has1 = false;
    let wakeLock = null;
    let blinkTick = null;
    let blinkVisible = true;

    // ── DOM ───────────────────────────────────────
    const timeDisplay = document.getElementById('timeDisplay');
    const timeLabel = document.getElementById('timeLabel');
    const taskLabel = document.getElementById('taskLabel');
    const playBtn = document.getElementById('playBtn');
    const muteBtn = document.getElementById('muteBtn');
    const voicePill = document.getElementById('voicePill');
    const voiceMsg = document.getElementById('voiceMsg');
    const ringWrap = document.getElementById('ringWrap');
    const canvas = document.getElementById('ringCanvas');
    const ctx = canvas.getContext('2d');
    const appEl = document.querySelector('.app');
    const holdArc = document.getElementById('holdArc');
    const focusStopBtn = document.getElementById('focusStopBtn');
    const HOLD_DURATION = 2000; // ms
    let holdLength = 0;
    let holdTimer = null;
    let holdStart = null;
    let holdRAF = null;

    // ── Focus mode ────────────────────────────────

    // Continuously resize canvas every rAF frame for `duration` ms so the
    // ring drawing always matches the CSS-transitioning ring-wrap size.
    // This eliminates the one-shot canvas "pop" that the old setTimeout caused.
    function syncCanvasDuringTransition(duration) {
      const end = performance.now() + duration;
      function frame(now) {
        initCanvas();
        refreshRing();
        if (now < end) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function enterFocusMode() {
      appEl.classList.add('focus-mode');
      syncCanvasDuringTransition(820); // 820ms covers the 720ms CSS transition
    }

    function exitFocusMode() {
      appEl.classList.remove('focus-mode');
      cancelHold();
      syncCanvasDuringTransition(700);
    }

    function pauseFromFocus() {
      exitFocusMode();
      pauseTimer();
    }

    // Hold-to-stop logic
    function holdProgress(elapsed) {
      const frac = Math.min(elapsed / HOLD_DURATION, 1);
      const offset = holdLength * (1 - frac);
      holdArc.style.strokeDashoffset = offset;
    }

    function startHold(e) {
      e.preventDefault();
      holdStart = Date.now();

      const w = focusStopBtn.offsetWidth;
      const h = focusStopBtn.offsetHeight;
      const rxStr = getComputedStyle(focusStopBtn).borderRadius;
      const rx = parseFloat(rxStr) || 20;

      holdArc.setAttribute('x', '1');
      holdArc.setAttribute('y', '1');
      holdArc.setAttribute('width', Math.max(0, w));
      holdArc.setAttribute('height', Math.max(0, h));
      holdArc.setAttribute('rx', rx);
      holdArc.parentElement.setAttribute('viewBox', `0 0 ${w + 2} ${h + 2}`);

      holdLength = holdArc.getTotalLength();
      if (!holdLength) holdLength = (w + h) * 2;
      holdArc.style.strokeDasharray = holdLength;
      holdArc.style.strokeDashoffset = holdLength;

      function animate() {
        const elapsed = Date.now() - holdStart;
        holdProgress(elapsed);
        if (elapsed >= HOLD_DURATION) {
          cancelHold();
          exitFocusMode();
          resetTimer();
          return;
        }
        holdRAF = requestAnimationFrame(animate);
      }
      holdRAF = requestAnimationFrame(animate);
    }

    function cancelHold() {
      if (holdRAF) { cancelAnimationFrame(holdRAF); holdRAF = null; }
      holdStart = null;
      holdArc.style.strokeDashoffset = holdLength;
    }

    focusStopBtn.addEventListener('mousedown', startHold);
    focusStopBtn.addEventListener('touchstart', startHold, { passive: false });
    focusStopBtn.addEventListener('mouseup', cancelHold);
    focusStopBtn.addEventListener('mouseleave', cancelHold);
    focusStopBtn.addEventListener('touchend', cancelHold);
    focusStopBtn.addEventListener('touchcancel', cancelHold);

    // ── Canvas setup ──────────────────────────────
    function initCanvas() {
      const sz = ringWrap.offsetWidth;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = sz * dpr;
      canvas.height = sz * dpr;
      canvas.style.width = sz + 'px';
      canvas.style.height = sz + 'px';
    }

    // Waves = number of 5-minute segments
    function numWaves() {
      return Math.max(2, totalSeconds / (5 * 60)); // Live continuous float based on seconds
    }

    // Logarithmic color: progress 1→0 maps green→orange→red
    function ringColor(progress) {
      // log stretch so changes accelerate near end
      const t = Math.log(1 + progress * (Math.E - 1)); // 0..1 log-scaled
      // t=1 (full/green), t=0 (empty/red)
      let hue;
      if (t >= 0.55) {
        // green zone: hue 150→115
        hue = 115 + ((t - 0.55) / 0.45) * 35;
      } else if (t >= 0.25) {
        // orange zone: hue 25→115
        hue = 25 + ((t - 0.25) / 0.30) * 90;
      } else {
        // red zone: hue 0→25
        hue = (t / 0.25) * 25;
      }
      const sat = 88 + (1 - t) * 10;
      const lit = 52 + t * 12;
      return `hsl(${Math.round(hue)},${Math.round(sat)}%,${Math.round(lit)}%)`;
    }

    // Build wavy arc path on canvas (returns nothing, strokes directly)
    function drawWavyArc(cx, cy, r, amp, wavesFloat, startAng, endAng, color, lineWidth, glow) {
      const steps = Math.max(240, Math.ceil(wavesFloat) * 40);
      const span = endAng - startAng;
      if (Math.abs(span) < 0.001) return;

      ctx.save();
      if (glow) {
        ctx.shadowColor = color;
        ctx.shadowBlur = lineWidth * 3;
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();

      const w0 = Math.floor(wavesFloat);
      const w1 = w0 + 1;
      const t = wavesFloat - w0;

      for (let i = 0; i <= steps; i++) {
        const frac = i / steps;
        const angle = startAng + frac * span;
        const wave0 = amp * Math.sin(w0 * 2 * Math.PI * frac);
        const wave1 = amp * Math.sin(w1 * 2 * Math.PI * frac);
        const wave = wave0 * (1 - t) + wave1 * t;
        const rr = r + wave;
        const x = cx + rr * Math.cos(angle);
        const y = cy + rr * Math.sin(angle);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawRingFrame(progress, color, showProgress) {
      const W = canvas.width;
      const cx = W / 2, cy = W / 2;
      const r = W * 0.40;
      const lw = Math.max(5, W * 0.028);
      const amp = lw * 0.6;
      const wavesFloat = numWaves();
      const start = -Math.PI / 2;
      const full = start + 2 * Math.PI;

      ctx.clearRect(0, 0, W, W);

      // Background track
      const trackColor = isLight ? 'rgba(5,150,105,0.09)' : 'rgba(77,255,195,0.07)';
      drawWavyArc(cx, cy, r, amp * 0.45, wavesFloat, start, full, trackColor, lw, false);

      if (!showProgress || progress <= 0) return;

      // Progress arc
      const endAng = start + progress * 2 * Math.PI;
      drawWavyArc(cx, cy, r, amp, wavesFloat, start, endAng, color, lw, true);

      // 5-min segment dots
      for (let i = 1; i < wavesFloat; i++) {
        const segFrac = i / wavesFloat;
        if (segFrac > progress + 0.005) break;
        const ang = start + segFrac * 2 * Math.PI;
        const mx = cx + r * Math.cos(ang);
        const my = cy + r * Math.sin(ang);
        ctx.save();
        ctx.beginPath();
        ctx.arc(mx, my, lw * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = isLight ? 'rgba(0,50,30,0.18)' : 'rgba(255,255,255,0.22)';
        ctx.globalAlpha = Math.min(1, (wavesFloat - i) * 3); // fade in gracefully
        ctx.fill();
        ctx.restore();
      }
    }

    function refreshRing() {
      const progress = totalSeconds > 0 ? remainingSeconds / totalSeconds : 0;
      const color = ringColor(progress);
      drawRingFrame(progress, color, true);
      // Tint time display when critical
      timeDisplay.style.color = progress < 0.12 ? color : '';
    }

    // ── Blink for final 10% ───────────────────────
    function startBlink() {
      if (blinkTick) return;
      blinkVisible = true;
      blinkTick = setInterval(() => {
        blinkVisible = !blinkVisible;
        const p = remainingSeconds / totalSeconds;
        const c = ringColor(p);
        drawRingFrame(p, c, blinkVisible);
        timeDisplay.style.color = blinkVisible ? c : 'rgba(212,240,232,0.2)';
      }, 500);
    }

    function stopBlink() {
      if (blinkTick) { clearInterval(blinkTick); blinkTick = null; }
      blinkVisible = true;
    }

    // ── Speech ────────────────────────────────────
    function speak(text) {
      if (isMuted) return;
      const now = Date.now();
      if (now - lastSpeakTime < 400) return;
      lastSpeakTime = now;
      vibrate([60, 40, 60]);
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US'; utt.rate = 0.95; utt.pitch = 1.0; utt.volume = 1.0;
      utt.onstart = () => { voicePill.classList.add('speaking'); showMsg(text); };
      utt.onend = utt.onerror = () => voicePill.classList.remove('speaking');
      window.speechSynthesis.speak(utt);
    }

    function showMsg(text) {
      voiceMsg.textContent = '"' + text + '"';
      voiceMsg.classList.add('show');
      clearTimeout(voiceMsg._t);
      voiceMsg._t = setTimeout(() => voiceMsg.classList.remove('show'), 3500);
    }

    function toggleMute() {
      isMuted = !isMuted;
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
      if (isMuted) window.speechSynthesis.cancel();
    }

    // ── Theme ─────────────────────────────────────
    function toggleTheme() {
      isLight = !isLight;
      applyTheme();
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    function applyTheme() {
      document.documentElement.dataset.theme = isLight ? 'light' : 'dark';
      document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
      document.querySelector('meta[name="theme-color"]').content = isLight ? '#f0faf5' : '#0d1a16';
      if (!blinkTick) refreshRing();
    }

    // ── Vibration ─────────────────────────────────
    function vibrate(pattern) {
      try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) { }
    }

    // ── Timer logic ───────────────────────────────
    function toggleTimer() {
      if (remainingSeconds <= 0) { resetTimer(); return; }
      isRunning = !isRunning;
      if (isRunning) {
        playBtn.innerHTML = '⏸';
        playBtn.classList.remove('paused');
        timeLabel.textContent = currentPreset;
        taskLabel.textContent = 'stay focused';
        vibrate([80, 50, 80]);
        speak(`Timer started. ${fmtMins(Math.ceil(remainingSeconds / 60))}.`);
        requestWakeLock();
        interval = setInterval(tick, 1000);
        enterFocusMode();
        appEl.classList.add('running'); // CSS explicit toggle overlay hide
        // Start breathing after the focus transition finishes so both
        // animations don't compete during the 720ms grow.
        setTimeout(() => ringWrap.classList.add('breathing'), 740);
      } else {
        pauseTimer();
      }
    }

    function pauseTimer() {
      isRunning = false;
      clearInterval(interval);
      stopBlink();
      releaseWakeLock();
      playBtn.innerHTML = '▶';
      playBtn.classList.add('paused');
      ringWrap.classList.remove('breathing');
      timeLabel.textContent = 'paused';
      taskLabel.textContent = 'timer paused';
      vibrate([40]);
      speak('Paused.');
    }

    function resetTimer() {
      isRunning = false;
      clearInterval(interval);
      stopBlink();
      releaseWakeLock();
      exitFocusMode();
      appEl.classList.remove('running');
      remainingSeconds = totalSeconds;
      resetFlags();
      window.speechSynthesis.cancel();
      playBtn.innerHTML = '▶';
      playBtn.classList.remove('paused');
      timeLabel.textContent = 'ready';
      taskLabel.textContent = currentPreset;
      ringWrap.classList.remove('done');
      ringWrap.classList.remove('breathing');
      voicePill.classList.remove('speaking');
      timeDisplay.style.color = '';
      updateClock();
      refreshRing();
    }

    function tick() {
      if (remainingSeconds <= 0) { timerDone(); return; }
      remainingSeconds--;
      updateClock();

      const progress = remainingSeconds / totalSeconds;
      const elapsed = totalSeconds - remainingSeconds;
      const remMins = Math.ceil(remainingSeconds / 60);

      // Blink trigger at final 10%
      if (progress <= 0.10 && isRunning) {
        startBlink();
      } else {
        stopBlink();
        refreshRing();
      }

      // ── Milestones ──
      if (!hasHalf && remainingSeconds === Math.floor(totalSeconds / 2)) {
        hasHalf = true;
        vibrate([60, 40, 60, 40, 60]);
        speak(`Halfway there! ${fmtMins(remMins)} left.`);
      }

      // Every multiple of 5 minutes remaining (50, 45, 40 … 10, 5)
      // fires when remainingSeconds hits exactly N*60, N divisible by 5
      if (
        remainingSeconds > 60 &&
        remainingSeconds % (5 * 60) === 0
      ) {
        vibrate([50, 30, 50]);
        speak(`It's ${getRealTime()}. ${fmtMins(remMins)} remaining.`);
      }

      if (!has1 && remainingSeconds === 60) {
        has1 = true;
        vibrate([80, 50, 80, 50, 80]);
        speak("Last minute. You're doing great!");
      }
      if (remainingSeconds === 30 && totalSeconds > 60) {
        vibrate([40, 30, 40]);
        speak('Thirty seconds.');
      }
    }

    function timerDone() {
      clearInterval(interval);
      isRunning = false;
      remainingSeconds = 0;
      stopBlink();
      releaseWakeLock();
      exitFocusMode();
      appEl.classList.remove('running');
      playBtn.innerHTML = '↺';
      timeLabel.textContent = 'done!';
      taskLabel.textContent = '🎉 great work!';
      ringWrap.classList.add('done');
      ringWrap.classList.remove('breathing');
      timeDisplay.style.color = '';
      updateClock();
      drawRingFrame(0, ringColor(0), false);
      vibrate([100, 60, 100, 60, 200]);
      speak("Time's up! Outstanding work. You did it!");
    }

    function addMinute() {
      totalSeconds += 60;
      remainingSeconds += 60;
      updateClock();
      if (!blinkTick) refreshRing();
      if (isRunning) { vibrate([40]); speak('One minute added.'); }
    }

    // ── iOS Wheel Picker ──────────────────────────
    const ITEM_H = 44;
    const VISIBLE = 5;
    const CENTER_OFF = (VISIBLE - 1) / 2 * ITEM_H; // 88

    const wheels = {
      h: { id: 'h', el: null, drum: null, min: 0, max: 10, offset: 0, raf: null, lastIdx: -1 },
      m: { id: 'm', el: null, drum: null, min: 0, max: 59, offset: 0, raf: null, lastIdx: -1 },
      s: { id: 's', el: null, drum: null, min: 0, max: 59, offset: 0, raf: null, lastIdx: -1 }
    };

    let activeWheel = null;
    let dragStartY = null;
    let dragStartOff = null;
    let dragLastY = null;
    let dragLastT = null;
    let dragVel = 0;

    function clampOff(w, off) { return Math.max(CENTER_OFF - (w.max - w.min) * ITEM_H, Math.min(CENTER_OFF, off)); }
    function off2idx(off) { return Math.round((CENTER_OFF - off) / ITEM_H); }
    function idx2off(i) { return CENTER_OFF - i * ITEM_H; }

    function getWheelFloatSecs() {
      const hId = (CENTER_OFF - wheels.h.offset) / ITEM_H;
      const mId = (CENTER_OFF - wheels.m.offset) / ITEM_H;
      const sId = (CENTER_OFF - wheels.s.offset) / ITEM_H;
      const h = wheels.h.min + hId;
      const m = wheels.m.min + mId;
      const s = wheels.s.min + sId;
      return Math.max(60, (h * 60 + m) * 60 + s); // min 1 min 0 sec
    }

    function renderWheel(id) {
      const w = wheels[id];
      if (!w.drum) return;
      w.drum.style.transform = `translateY(${w.offset}px)`;
      const center = (CENTER_OFF - w.offset) / ITEM_H;
      w.drum.querySelectorAll('.wheel-item').forEach((el, i) => {
        const d = Math.abs(i - center);
        el.style.opacity = Math.max(0.15, 1 - d * 0.38);
        el.style.transform = `scaleY(${Math.max(0.76, 1 - d * 0.08)})`;
      });
      const idx = off2idx(w.offset);
      if (idx !== w.lastIdx && idx >= 0 && idx <= (w.max - w.min)) {
        w.lastIdx = idx;
        vibrate([3]);
      }

      // Smooth live shape change
      if (!isRunning && activeWheel) {
        totalSeconds = remainingSeconds = getWheelFloatSecs();
        updateClock();
        refreshRing();
      }
    }

    function applyWheelValue() {
      if (isRunning) return;
      const hIdx = Math.max(0, Math.min(wheels.h.max - wheels.h.min, off2idx(wheels.h.offset)));
      const mIdx = Math.max(0, Math.min(wheels.m.max - wheels.m.min, off2idx(wheels.m.offset)));
      const sIdx = Math.max(0, Math.min(wheels.s.max - wheels.s.min, off2idx(wheels.s.offset)));
      let hrs = wheels.h.min + hIdx;
      let mins = wheels.m.min + mIdx;
      let secs = wheels.s.min + sIdx;

      // if (hrs === 0 && mins === 0 && secs === 0) { ... we allow 0 now potentially, or cap at 1 sec }
      if (hrs === 0 && mins === 0 && secs === 0) {
        secs = 1;
        wheels.s.offset = idx2off(secs - wheels.s.min);
        renderWheel('s');
      }

      totalSeconds = remainingSeconds = (hrs * 60 + mins) * 60 + secs;
      if (hrs > 0) currentPreset = mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`;
      else if (mins > 0) currentPreset = secs > 0 ? `${mins}m ${secs}s` : `${mins} min`;
      else currentPreset = `${secs} sec`;
      resetFlags();
      timeLabel.textContent = 'ready';
      taskLabel.textContent = currentPreset;
      ringWrap.classList.remove('done');
      timeDisplay.style.color = '';
      updateClock();
      stopBlink();
      initCanvas();
      refreshRing();
    }

    function snapToIdx(w, idx) {
      idx = Math.max(0, Math.min(w.max - w.min, idx));
      const target = idx2off(idx);
      const start = w.offset;
      const dist = target - start;
      const dur = Math.min(300, Math.max(80, Math.abs(dist) * 1.2));
      const t0 = performance.now();
      if (w.raf) cancelAnimationFrame(w.raf);
      function frame(now) {
        const t = Math.min((now - t0) / dur, 1);
        const ease = 1 - Math.pow(1 - t, 3); // cubic-out
        w.offset = start + dist * ease;
        renderWheel(w.id);
        if (t < 1) { w.raf = requestAnimationFrame(frame); }
        else { w.offset = target; renderWheel(w.id); applyWheelValue(); }
      }
      w.raf = requestAnimationFrame(frame);
    }

    function wheelPointerDown(e, wId) {
      const w = wheels[wId];
      if (w.raf) { cancelAnimationFrame(w.raf); w.raf = null; }
      if (!e.touches) e.preventDefault();
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      activeWheel = wId;
      dragStartY = y; dragStartOff = w.offset;
      dragLastY = y; dragLastT = performance.now();
      dragVel = 0;
    }

    function wheelPointerMove(e) {
      if (dragStartY === null || !activeWheel) return;
      e.preventDefault();
      const w = wheels[activeWheel];
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      const now = performance.now();
      const dt = now - dragLastT;
      if (dt > 0) dragVel = (y - dragLastY) / dt * 16;
      dragLastY = y; dragLastT = now;
      w.offset = clampOff(w, dragStartOff + (y - dragStartY));
      renderWheel(w.id);
    }

    function wheelPointerUp() {
      if (dragStartY === null || !activeWheel) return;
      let wId = activeWheel;
      let w = wheels[wId];
      activeWheel = null;
      dragStartY = null;
      let v = dragVel;
      if (w.raf) cancelAnimationFrame(w.raf);
      function decel() {
        v *= 0.90;
        w.offset = clampOff(w, w.offset + v);
        renderWheel(wId);
        if (Math.abs(v) < 0.3) { snapToIdx(w, off2idx(w.offset)); }
        else { w.raf = requestAnimationFrame(decel); }
      }
      w.raf = requestAnimationFrame(decel);
    }

    function buildWheel() {
      // Init Hour Wheel
      wheels.h.el = document.getElementById('hourWheelEl');
      wheels.h.drum = document.getElementById('hourDrum');
      if (wheels.h.drum) {
        for (let v = wheels.h.min; v <= wheels.h.max; v++) {
          const el = document.createElement('div');
          el.className = 'wheel-item'; el.textContent = v;
          wheels.h.drum.appendChild(el);
        }
      }

      // Init Min Wheel
      wheels.m.el = document.getElementById('minuteWheelEl');
      wheels.m.drum = document.getElementById('minuteDrum');
      if (wheels.m.drum) {
        for (let v = wheels.m.min; v <= wheels.m.max; v++) {
          const el = document.createElement('div');
          el.className = 'wheel-item'; el.textContent = v;
          wheels.m.drum.appendChild(el);
        }
      }

      // Init Sec Wheel
      wheels.s.el = document.getElementById('secondWheelEl');
      wheels.s.drum = document.getElementById('secondDrum');
      if (wheels.s.drum) {
        for (let v = wheels.s.min; v <= wheels.s.max; v++) {
          const el = document.createElement('div');
          el.className = 'wheel-item'; el.textContent = v;
          wheels.s.drum.appendChild(el);
        }
      }

      // Set default (5 min)
      wheels.h.offset = idx2off(0); // 0 hours
      wheels.m.offset = idx2off(5 - wheels.m.min); // 5 mins
      wheels.s.offset = idx2off(0); // 0 secs
      wheels.h.lastIdx = off2idx(wheels.h.offset);
      wheels.m.lastIdx = off2idx(wheels.m.offset);
      wheels.s.lastIdx = off2idx(wheels.s.offset);
      renderWheel('h');
      renderWheel('m');
      renderWheel('s');
      applyWheelValue();

      // Bind Events
      ['h', 'm', 's'].forEach(id => {
        const wc = wheels[id].el;
        if (!wc) return;
        wc.addEventListener('touchstart', e => wheelPointerDown(e, id), { passive: true });
        wc.addEventListener('touchmove', wheelPointerMove, { passive: false });
        wc.addEventListener('touchend', wheelPointerUp);
        wc.addEventListener('touchcancel', wheelPointerUp);
        wc.addEventListener('mousedown', e => wheelPointerDown(e, id));
        wc.addEventListener('wheel', e => {
          e.preventDefault();
          const w = wheels[id];
          if (w.raf) { cancelAnimationFrame(w.raf); w.raf = null; }
          const delta = e.deltaY > 0 ? -1 : 1;
          snapToIdx(w, off2idx(w.offset) - delta);
        }, { passive: false });
      });

      window.addEventListener('mousemove', wheelPointerMove);
      window.addEventListener('mouseup', wheelPointerUp);
    }

    function resetFlags() {
      hasHalf = has5 = has2 = has1 = false;
      lastFiveMinAnn = 0;
    }

    // ── Helpers ───────────────────────────────────
    function updateClock() {
      const sec = Math.ceil(remainingSeconds);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;

      if (h > 0) {
        timeDisplay.textContent = `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      } else {
        timeDisplay.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }
    }

    function fmtMins(n) { return n === 1 ? '1 minute' : `${n} minutes`; }

    function getRealTime() {
      const now = new Date();
      let h = now.getHours(), m = now.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return m === 0 ? `${h} ${ampm}` : `${h}:${String(m).padStart(2, '0')} ${ampm}`;
    }

    // ── Wake Lock ─────────────────────────────────
    async function requestWakeLock() {
      try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
      catch (e) { }
    }
    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release().catch(() => { }); wakeLock = null; }
    }
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && isRunning) await requestWakeLock();
    });

    // ── PWA ───────────────────────────────────────
    if ('serviceWorker' in navigator) {
      const sw = `self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request)));`;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))).catch(() => { });
    }

    // ── iOS speech unlock ─────────────────────────
    document.addEventListener('touchstart', function u() {
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
      document.removeEventListener('touchstart', u);
    }, { once: true });

    // ── Init ──────────────────────────────────────
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      isLight = saved ? saved === 'light' : window.matchMedia('(prefers-color-scheme: light)').matches;
      applyTheme();
    })();

    requestAnimationFrame(() => {
      initCanvas();
      buildWheel(); // sets initial time from wheel, calls refreshRing + updateClock
      // Explicitly hide ring on first load using the CSS defaults since app starts !isRunning
    });
    window.addEventListener('resize', () => {
      initCanvas();
      if (!blinkTick) refreshRing();

      // Handle ITEM_H recalculation on resize for responsive wheels
      const newH = getDynamicItemHeight();
      if (ITEM_H !== newH) {
        ITEM_H = newH;
        CENTER_OFF = (VISIBLE - 1) / 2 * ITEM_H;
        // Keep internal values conceptually synced by snapping to the nearest whole index
        ['h', 'm', 's'].forEach(id => {
          const w = wheels[id];
          const idx = off2idx(w.offset); // approx
          snapToIdx(w, Math.round((CENTER_OFF - w.offset) / ITEM_H));
        });
      }
    });
  </script>
</body>
